<div class="container mt-4">
    <h2>Lista de Visitantes</h2>

    <div class="row mb-3 mt-4 align-items-center">
        <!-- Primer buscador: Buscar por texto general, con botón primero -->
        <form class="d-flex col-lg-5" role="search">
            <button class="btn btn-sm me-2" type="submit">Buscar</button>
            <input class="form-control form-control-sm" type="search" aria-label="Search">
        </form>

        <!-- Segundo buscador: Dropdown con tipos de búsqueda (Fecha, DNI, Tipo de visitante) -->
        <form class="d-flex col-lg-5" role="search">
            <div class="dropdown me-2">
                <button class="btn btn-sm dropdown-toggle" type="button" id="dropdownSearchTypes" data-bs-toggle="dropdown" aria-expanded="false">
                    Buscar por
                </button>
                <ul class="dropdown-menu" aria-labelledby="dropdownSearchTypes">
                    <li><button class="dropdown-item" type="button" onclick="setSearchType('date')">Fecha</button></li>
                    <li><button class="dropdown-item" type="button" onclick="setSearchType('dni')">DNI</button></li>
                    <li><button class="dropdown-item" type="button" onclick="setSearchType('visitorType')">Tipo de visitante</button></li>
                </ul>
            </div>
            <input id="searchInput" class="form-control form-control-sm" type="text" aria-label="Search">
        </form>

        <!-- Dropdown con ícono de tres puntos verticales-->
        <div class="col-lg-2 d-flex justify-content-end align-items-center">
            <div class="dropdown">
                <button class="btn btn-sm" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
                        <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"></path>
                    </svg>
                </button>
                <ul class="dropdown-menu">
                    <li><button class="dropdown-item" type="button">Exportar en Excel</button></li>
                </ul>
            </div>
        </div>
    </div>


    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>DNI</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let visitor of visitors$ | async; trackBy: trackByVisitorId">
                <td>{{ visitor.name }}</td>
                <td>{{ visitor.lastName }}</td>
                <td>{{ visitor.docNumber }}</td>
                <td>
                    <a class="btn btn-warning btn-sm" [routerLink]="['/visitor/edit', visitor.visitorId]">Editar</a>
                    <button class="btn btn-danger btn-sm" (click)="deleteVisitor(visitor.visitorId)">Eliminar</button>
                </td>
            </tr>
        </tbody>
    </table>

    <a routerLink="/visitor/add" class="btn btn-success">Agregar Visitante</a>

       <!-- Controles de paginación -->
       <div class="d-flex align-items-end flex-column mb-3">
        <!-- Botones para cambiar la cantidad de filas por página -->
        <div class="btn-group me-2" role="group" aria-label="Rows per page">
            <button type="button" class="btn btn-sm" >10</button>
            <button type="button" class="btn btn-sm" >25</button>
            <button type="button" class="btn btn-sm" >50</button>
        </div>


</div>
